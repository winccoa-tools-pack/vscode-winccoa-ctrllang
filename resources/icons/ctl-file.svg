<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <mask id="cutouts"
          maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse"
          x="0" y="0" width="128" height="128">

      <!-- everything visible -->
      <rect x="0" y="0" width="128" height="128" fill="white"/>

      <!-- brackets (thinner + slightly up for optical centering) -->
      <g fill="none" stroke="black" stroke-linecap="round" stroke-linejoin="round"
         transform="translate(0,-4)">
        <path d="M44 34c-12 0-12 12-12 12v12c0 10-10 10-10 10s10 0 10 10v12s0 12 12 12"
              stroke-width="8"/>
        <path d="M84 34c12 0 12 12 12 12v12c0 10 10 10 10 10s-10 0-10 10v12s0 12-12 12"
              stroke-width="8"/>
      </g>

      <!-- left * -->
      <text x="52" y="74"
            text-anchor="middle" dominant-baseline="middle"
            font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
            font-size="46" font-weight="800"
            fill="black">*</text>

      <!-- right * -->
      <text x="76" y="74"
            text-anchor="middle" dominant-baseline="middle"
            font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
            font-size="46" font-weight="800"
            fill="black">*</text>
    </mask>
  </defs>

  <!-- VS Code Python / C++ style blue -->
  <rect x="14" y="14" width="100" height="100" rx="10"
        fill="#3572A5"
        mask="url(#cutouts)"/>
</svg>
