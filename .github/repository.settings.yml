# Repository settings applied via GitHub REST API by .github/workflows/apply-settings-and-rulesets.yml
# This repo uses GitFlow: develop is default, main is stable release.

description: "Language support for WinCC OA CTRL and CTRL++ in Visual Studio Code"
homepage: "https://github.com/winccoa-tools-pack/vscode-winccoa-ctrllang"
default_branch: "develop"

has_issues: true
has_wiki: false

allow_squash_merge: true
allow_merge_commit: true
allow_rebase_merge: false
allow_auto_merge: true

delete_branch_on_merge: true

topics:
  - winccoa
  - wincc-oa
  - vscode
  - automation
  - vscode-extension
  - scada
  - hmi
  - industrial-automation
  - Siemens
  - ETM
  - test
  - test-automation
  - ctrl
  - ctrl++
  - ctrl-language
  - ctrl-language-support
  - ctrl-language-extension
  - ctrl-lang-support
  - ctrl-lang-extension
  - ctrl-lang
  - ctrl-autocompletion
  - ctrl-syntax-highlighting
  - ctrl-code-linting
  - ctrl-code-formatting
  - ctrl-code-snippets
  - ctrl-code-navigation
  - ctrl-code-intelligence
  - ctrl-intellisense
  - ctrlpp-basic-support
  - ctrl-code-documentation
  - ctrl-docs
  - ctrl-language-server
  - ctrl-lsp
  - ctrlpp-lsp-basic-support

security:
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true
